## SonarCloud: integration coverage (separate from integration.yml) + scanner.
#
# Coverage jobs mirror Integration PR gates (safe to test, splitter, AWS) but run ansible-test with
# --coverage only here. integration.yml runs the same targets without coverage. finalize scans after coverage.
#
# ORG NOTE: Secret name ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT is shared across ansible-collections repos.

---
name: SonarCloud

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - unlabeled
      - synchronize
    branches:
      - main
      - stable-*

permissions:
  contents: read
  pull-requests: read

jobs:
  safe-to-test:
    if: ${{ github.event.label.name == 'safe to test' }} || ${{ github.event.action != 'labeled' }}
    uses: ansible-network/github_actions/.github/workflows/safe-to-test.yml@main

  splitter:
    needs:
      - safe-to-test
    runs-on: ubuntu-latest
    env:
      source_dir: "cloud_awsops"
    outputs:
      test_targets: ${{ steps.splitter.outputs.test_targets }}
      test_targets_json: ${{ steps.splitter.outputs.test_targets_json }}
      test_jobs: ${{ steps.splitter.outputs.test_jobs }}
    steps:
      - name: Checkout collection
        uses: actions/checkout@v3
        with:
          path: ${{ env.source_dir }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: "0"

      - name: List changes for pull request
        id: splitter
        uses: ansible-network/github_actions/.github/actions/ansible_test_splitter@main
        with:
          collections_to_test: ${{ env.source_dir }}
          total_jobs: 2

  coverage-test:
    if: ${{ needs.splitter.outputs.test_targets != '' }}
    runs-on: ubuntu-latest
    needs:
      - splitter
    env:
      source: "./source"
      ansible_version: "milestone"
      python_version: "3.12"
    strategy:
      fail-fast: false
      matrix:
        workflow-id: ${{ fromJson(needs.splitter.outputs.test_jobs) }}
    name: "coverage-integration-${{ matrix.workflow-id }}"
    steps:
      - name: Read target
        id: read-targets
        run: |
          import json, os
          with open(os.environ.get('GITHUB_OUTPUT'), "a", encoding="utf-8") as fh:
              fh.write(f'ansible_test_targets={json.loads(os.environ.get("ALL_TEST_TARGETS")).get(os.environ.get("WORKFLOW_ID"))}\n')
        shell: python
        env:
          ALL_TEST_TARGETS: ${{ needs.splitter.outputs.test_targets_json }}
          WORKFLOW_ID: ${{ matrix.workflow-id }}

      - name: Checkout collection
        uses: actions/checkout@v3
        with:
          path: ${{ env.source }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python ${{ env.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.python_version }}

      - name: Install ansible-core (${{ env.ansible_version }})
        run: >-
          python3 -m pip install
          https://github.com/ansible/ansible/archive/${{ env.ansible_version }}.tar.gz
          --disable-pip-version-check
        shell: bash

      - name: Pre install collections dependencies first so the collection install does not
        run: ansible-galaxy collection install --pre '-r${{ env.source }}/tests/integration/requirements.yml' -p /home/runner/collections/

      - name: Build and install collection
        id: install
        uses: ansible-network/github_actions/.github/actions/build_install_collection@main
        with:
          install_python_dependencies: false
          source_path: ${{ env.source }}

      - name: Create AWS/sts session credentials
        uses: ansible-network/github_actions/.github/actions/ansible_aws_test_provider@main
        with:
          collection_path: ${{ steps.install.outputs.collection_path }}
          ansible_core_ci_key: ${{ secrets.ANSIBLE_CORE_CI_KEY }}

      - name: Set up git
        run: |
          git config --global user.email gha@localhost
          git config --global user.name "Github Actions"
        shell: bash

      - name: Install collection python requirements
        run: python3 -m pip install -r test-requirements.txt --disable-pip-version-check
        working-directory: ${{ steps.install.outputs.collection_path }}
        shell: bash

      - name: Run integration tests with coverage
        run: >-
          ansible-test integration
          --diff
          --no-temp-workdir
          --color
          --skip-tags False
          --retry-on-error
          --continue-on-error
          --coverage
          --requirements
          --python ${{ env.python_version }}
          -v
          ${{ steps.read-targets.outputs.ansible_test_targets }}
        working-directory: ${{ steps.install.outputs.collection_path }}
        shell: bash

      - name: Upload integration coverage data
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-raw-${{ matrix.workflow-id }}
          path: ${{ steps.install.outputs.collection_path }}/tests/output/
          if-no-files-found: ignore
          retention-days: 5

  coverage:
    name: Integration test coverage
    if: >-
      needs.splitter.outputs.test_targets != ''
      && needs.coverage-test.result != 'skipped'
      && needs.coverage-test.result != 'cancelled'
    runs-on: ubuntu-latest
    needs:
      - splitter
      - coverage-test
    env:
      source: "./source"
      ansible_version: "milestone"
      python_version: "3.12"
    steps:
      - name: Checkout collection
        uses: actions/checkout@v3
        with:
          path: ${{ env.source }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python ${{ env.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.python_version }}

      - name: Install ansible-core (${{ env.ansible_version }})
        run: >-
          python3 -m pip install
          https://github.com/ansible/ansible/archive/${{ env.ansible_version }}.tar.gz
          --disable-pip-version-check
        shell: bash

      - name: Pre install collections dependencies first so the collection install does not
        run: ansible-galaxy collection install --pre '-r${{ env.source }}/tests/integration/requirements.yml' -p /home/runner/collections/

      - name: Build and install collection
        id: install
        uses: ansible-network/github_actions/.github/actions/build_install_collection@main
        with:
          install_python_dependencies: false
          source_path: ${{ env.source }}

      - name: Install collection python requirements
        run: python3 -m pip install -r test-requirements.txt --disable-pip-version-check
        working-directory: ${{ steps.install.outputs.collection_path }}
        shell: bash

      - name: Download integration coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-raw-*
          merge-multiple: true
          path: ${{ steps.install.outputs.collection_path }}/tests/output

      - name: Combine and emit coverage XML
        working-directory: ${{ steps.install.outputs.collection_path }}
        run: |
          ansible-test coverage combine --requirements --python "${{ env.python_version }}"
          ansible-test coverage xml --requirements --python "${{ env.python_version }}"

      - name: Prepare coverage.xml for SonarCloud
        run: |
          set -euo pipefail
          collection_path="${{ steps.install.outputs.collection_path }}"
          xml=$(find "${collection_path}/tests/output/reports" -maxdepth 1 -name '*.xml' ! -name '*powershell*' | head -1)
          test -n "${xml}"
          cp "${xml}" "${GITHUB_WORKSPACE}/coverage.xml"
          sed -i "s#${GITHUB_WORKSPACE}/##g" "${GITHUB_WORKSPACE}/coverage.xml"
          sed -i "s#${collection_path}/##g" "${GITHUB_WORKSPACE}/coverage.xml"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ github.workspace }}/coverage.xml
          retention-days: 5

  finalize:
    name: finalize
    needs:
      - coverage
    if: >-
      needs.coverage.result == 'success'
      && github.event.pull_request.head.repo.full_name == github.repository
      && secrets.ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .

      - name: Set coverage report paths
        run: |
          coverage_files=$(find . -name "coverage*.xml" -type f 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "Found coverage files: ${coverage_files:-none}"
          echo "COVERAGE_PATHS=${coverage_files}" >> "$GITHUB_ENV"

      - name: Prepare SonarCloud args
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          SONAR_ARGS="-Dsonar.scm.revision=\"${COMMIT_SHA}\""
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.pullrequest.key=${PR_NUMBER}"
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.pullrequest.branch=${PR_HEAD}"
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.pullrequest.base=${PR_BASE}"
          if [[ -n "${COVERAGE_PATHS:-}" ]]; then
            SONAR_ARGS="${SONAR_ARGS} -Dsonar.python.coverage.reportPaths=${COVERAGE_PATHS}"
          fi
          echo "SONAR_ARGS=${SONAR_ARGS}" >> "$GITHUB_ENV"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT }}
        with:
          args: ${{ env.SONAR_ARGS }}
