## SonarCloud Analysis Workflow (redhat-cop canonical)
#
# Coverage jobs run Integration tests all targets with ansible-test with --coverage, then finalize scans after coverage.
# Downloads coverage* artifacts from that run and passes sonar.python.coverage.reportPaths to the scanner.

---
name: SonarCloud

on:
  push:
    branches:
      - main
      - stable-*

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  safe-to-test:
    if: ${{ github.event.label.name == 'safe to test' }} || ${{ github.event.action != 'labeled' }}
    uses: ansible-network/github_actions/.github/workflows/safe-to-test.yml@d6170859194bb9ca227655c03c9048455364a822  # main, committed on Jul 26, 2023

  splitter:
    needs:
      - safe-to-test
    runs-on: ubuntu-latest
    env:
      source_dir: "cloud_awsops"
      SPLITTER_TEST_ALL_THE_TARGETS: "true"
    outputs:
      targets: ${{ steps.splitter.outputs.targets }}
      test_jobs: ${{ steps.splitter.outputs.jobs }}
    steps:
      - name: Checkout collection
        uses: actions/checkout@v6
        with:
          path: ${{ env.source_dir }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: "0"

      - name: List changes for pull request
        id: splitter
        uses: ansible/cloud-content-ci-automation/.github/actions/ansible_test_splitter@a93c78e1d842d4ee8961769110d88ac16bcc217a  # main, Commits on May 15, 2026
        with:
          collections_to_test: ${{ env.source_dir }}
          total_jobs: 1
          base_ref: "${{ github.event.pull_request.base.ref }}"

      - name: Display splitter output
        run: |
          echo "test_targets=${{ steps.splitter.outputs.targets }}"
          echo "test_jobs=${{ steps.splitter.outputs.jobs }}"
        shell: bash

  coverage-test:
    if: ${{ needs.splitter.outputs.targets != '' }}
    runs-on: ubuntu-latest
    needs:
      - splitter
    env:
      source: "./source"
      ansible_version: "milestone"
      python_version: "3.12"
      ansible_test_splitter_targets: "${{ needs.splitter.outputs.targets }}"
    strategy:
      fail-fast: false
      matrix:
        workflow-id: ${{ fromJson(needs.splitter.outputs.test_jobs) }}
    name: "coverage-integration-${{ matrix.workflow-id }}"
    steps:
      - name: Read job targets
        id: read-targets
        uses: ansible/cloud-content-ci-automation/.github/actions/ansible_read_targets@0b891487c4170ef856f02313c66cb1c776814c42  # main, committedon Apr 1, 2026
        with:
          job_id: "${{ matrix.workflow-id }}"
          all_targets: "${{ env.ansible_test_splitter_targets }}"

      - name: Display ansible test targets
        run: |
          echo "ansible_test_targets -> ${{ steps.read-targets.outputs.job_targets }}"
        shell: bash

      - name: Create AWS/sts session credentials
        uses: ansible/ansible-test-auth@008750a5bf07124c3ab86d30d73d7319d7518f36  # v1.0.0, committed on Mar 13, 2026

      - name: Run integration tests with coverage
        id: integration
        uses: ansible-community/ansible-test-gh-action@d3a8ec7a59694e25e210fcd44738910149537f0e  # v1.17.0, committed on Aug 6, 2025
        with:
          ansible-core-version: ${{ env.ansible_version }}
          origin-python-version: ${{ env.python_version }}
          testing-type: integration
          target-python-version: ${{ env.python_version }}
          target: ${{ steps.read-targets.outputs.job_targets }}
          git-checkout-ref: ${{ github.event.pull_request.head.sha }}
          coverage: always
          test-deps: >-
            git+https://github.com/ansible-collections/amazon.aws.git,main
            git+https://github.com/ansible-collections/community.aws.git,main
            community.crypto
          pre-test-cmd: python -m pip install -r tests/integration/constraints.txt -r tests/integration/requirements.txt

      - name: Upload integration coverage data
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-raw-${{ matrix.workflow-id }}
          path: ${{ steps.integration.outputs.checkout-directory }}/tests/output/
          if-no-files-found: ignore
          retention-days: 5

  coverage:
    name: Integration test coverage
    if: >-
      needs.splitter.outputs.targets != ''
      && needs.coverage-test.result != 'skipped'
      && needs.coverage-test.result != 'cancelled'
    runs-on: ubuntu-latest
    needs:
      - splitter
      - coverage-test
    env:
      source: "./source"
      ansible_version: "milestone"
      python_version: "3.12"
    steps:
      - name: Checkout collection
        uses: actions/checkout@v6
        with:
          path: ${{ env.source }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: "0"

      - name: Download integration coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-raw-*
          merge-multiple: true
          path: ${{ steps.install.outputs.collection_path }}/tests/output

      - name: Combine and emit coverage XML
        working-directory: ${{ steps.install.outputs.collection_path }}
        run: |
          ansible-test coverage combine --requirements --python "${{ env.python_version }}"
          ansible-test coverage xml --requirements --python "${{ env.python_version }}"

      - name: Prepare coverage.xml for SonarCloud
        run: |
          set -euo pipefail
          collection_path="${{ steps.install.outputs.collection_path }}"
          xml=$(find "${collection_path}/tests/output/reports" -maxdepth 1 -name '*.xml' ! -name '*powershell*' | head -1)
          test -n "${xml}"
          cp "${xml}" "${GITHUB_WORKSPACE}/coverage.xml"
          sed -i "s#${GITHUB_WORKSPACE}/##g" "${GITHUB_WORKSPACE}/coverage.xml"
          sed -i "s#${collection_path}/##g" "${GITHUB_WORKSPACE}/coverage.xml"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ github.workspace }}/coverage.xml
          retention-days: 5

  finalize:
    name: finalize
    needs:
      - coverage
    if: >-
      needs.coverage.result == 'success'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .

      - name: Set coverage report paths
        run: |
          coverage_files=$(find . -name "coverage*.xml" -type f 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "Found coverage files: ${coverage_files:-none}"
          echo "COVERAGE_PATHS=${coverage_files}" >> "$GITHUB_ENV"

      - name: Prepare SonarCloud args
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          SONAR_ARGS="-Dsonar.scm.revision=\"${COMMIT_SHA}\""
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.pullrequest.key=${PR_NUMBER}"
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.pullrequest.branch=${PR_HEAD}"
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.pullrequest.base=${PR_BASE}"
          if [[ -n "${COVERAGE_PATHS:-}" ]]; then
            SONAR_ARGS="${SONAR_ARGS} -Dsonar.python.coverage.reportPaths=${COVERAGE_PATHS}"
          fi
          echo "SONAR_ARGS=${SONAR_ARGS}" >> "$GITHUB_ENV"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT }}
        with:
          args: ${{ env.SONAR_ARGS }}
